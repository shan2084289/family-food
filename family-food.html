<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭管家</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F4EF;--white:#fff;
  --green:#3A6B4A;--green-l:#EAF2EC;--green-m:#5A8F6A;
  --orange:#D4621A;--orange-l:#FDF0E8;
  --red:#C0392B;--red-l:#FEF2F2;
  --yellow:#D4A017;--yellow-l:#FFFBEB;
  --blue:#2563EB;--blue-l:#EFF6FF;
  --teal:#0D9488;--teal-l:#F0FDFA;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --gray:#6B7280;--gray-l:#F3F4F6;
  --text:#1C1C1C;--text-m:#4A4A4A;--text-x:#888;
  --border:#E4DDD4;
  --sh:0 1px 4px rgba(0,0,0,.07);
  --sh2:0 3px 12px rgba(0,0,0,.09);
  --sh3:0 8px 28px rgba(0,0,0,.15);
  --r:14px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--green);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.logo{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px}
.hdr-r{display:flex;align-items:center;gap:8px}
.sync{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:flex;align-items:center;gap:4px}
.sync.on{background:rgba(255,255,255,.15);color:#A7F3D0}
.sync.off{background:rgba(255,100,100,.2);color:#FCA5A5}
.sync-dot{width:6px;height:6px;border-radius:50%}
.sync.on .sync-dot{background:#34D399;animation:pulse 2s infinite}
.sync.off .sync-dot{background:#F87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.usr-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}

/* TABS */
.main-tabs{background:var(--green);display:flex;padding:0 16px 12px;gap:8px}
.main-tab{flex:1;padding:8px 4px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;text-align:center;transition:all .15s;line-height:1.3}
.main-tab.active{background:#fff;color:var(--green)}
.main-tab:not(.active){background:rgba(255,255,255,.15);color:rgba(255,255,255,.85)}

main{max-width:900px;margin:0 auto;padding:16px 14px 60px}

/* LOADING */
.load-scr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--text-x)}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-err{font-size:12px;color:var(--red);max-width:280px;text-align:center;margin-top:4px}

/* STATS */
.stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:#fff;border-radius:12px;padding:10px 12px;box-shadow:var(--sh);flex:1;min-width:75px;cursor:pointer}
.stat-n{font-size:20px;font-weight:800;line-height:1}
.stat-l{font-size:10px;color:var(--text-x);font-weight:600;margin-top:3px}
.st-g .stat-n{color:var(--green)}
.st-o .stat-n{color:var(--orange)}
.st-r .stat-n{color:var(--red)}
.st-t .stat-n{color:var(--teal)}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.sw{position:relative;flex:1;min-width:130px}
.sw input{width:100%;padding:8px 12px 8px 30px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:#fff;outline:none;color:var(--text)}
.sw input:focus{border-color:var(--green-m)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-x);pointer-events:none;font-size:13px}
.fsel{padding:7px 9px;border:1.5px solid var(--border);border-radius:10px;font-size:12px;background:#fff;outline:none;color:var(--text);cursor:pointer}
.btn-add{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}

/* FILTER TABS */
.frow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ftab{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text-m);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:3px}
.ftab.active{color:#fff;border-color:transparent;background:var(--green)}
.ftab.hact{color:#fff;border-color:transparent;background:var(--blue)}
.ftab-c{font-size:10px;padding:1px 5px;border-radius:10px;background:var(--green-l);color:var(--green)}
.ftab.active .ftab-c,.ftab.hact .ftab-c{background:rgba(255,255,255,.25);color:#fff}

/* FOOD LIST */
.food-list{display:flex;flex-direction:column;gap:10px}
.food-row{background:#fff;border-radius:var(--r);box-shadow:var(--sh);display:flex;align-items:stretch;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;position:relative}
.food-row:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.fr-photo{width:80px;flex-shrink:0;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden}
.fr-photo img{width:100%;height:100%;object-fit:cover}
.fr-main{flex:1;padding:10px 10px 9px;min-width:0}
.fr-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:6px}
.fr-name{font-size:14px;font-weight:700;line-height:1.3}
.bc-badge{font-size:10px;color:var(--text-x)}
.htag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.htag-n{background:var(--blue);color:#fff}
.htag-o{background:var(--gray);color:#fff}
.qrow{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.qbtn{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text-m);font-weight:700;flex-shrink:0}
.qbtn:hover{border-color:var(--green);color:var(--green);background:var(--green-l)}
.qbtn.minus:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-l)}
.qtotal{font-size:12px;font-weight:700;color:var(--text);min-width:30px;text-align:center}
.ubtn{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;border:none;background:var(--red-l);color:var(--red);cursor:pointer;white-space:nowrap}
.fr-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600}
.ch-z{background:var(--green-l);color:var(--green)}
.ch-op{background:var(--teal-l);color:var(--teal)}
.ch-sl{background:var(--green-l);color:var(--green)}
.ch-loc{background:#EEF2FF;color:#4338CA}
.ch-tr{background:var(--orange-l);color:var(--orange)}
.ch-tm{background:var(--purple-l);color:var(--purple)}
.ch-w{background:var(--green-l);color:var(--green)}
.ch-we{background:var(--red-l);color:var(--red)}
.ch-st{background:#FEF9C3;color:#B45309}

/* DAYS CIRCLE */
.dc-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 12px;flex-shrink:0;min-width:64px}
.dc{width:48px;height:48px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:3px}
.dc.ok{background:var(--green-l)}
.dc.w30{background:var(--yellow-l)}
.dc.w7{background:var(--orange-l)}
.dc.exp{background:var(--red-l)}
.dc.none{background:var(--gray-l)}
.dc-n{font-size:15px;font-weight:900;line-height:1}
.dc.ok .dc-n{color:var(--green)}
.dc.w30 .dc-n{color:var(--yellow)}
.dc.w7 .dc-n{color:var(--orange)}
.dc.exp .dc-n{color:var(--red)}
.dc.none .dc-n{color:var(--gray)}
.dc-u{font-size:9px;font-weight:600;opacity:.8}
.dc-d{font-size:9px;color:var(--text-x);text-align:center}

/* MAINT GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
.mcard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .18s,transform .18s;cursor:pointer}
.mcard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.mc-photo{width:100%;aspect-ratio:16/9;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.mc-photo img{width:100%;height:100%;object-fit:cover}
.mc-top{padding:10px 12px 6px}
.mc-ir{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.mc-icon{font-size:22px;flex-shrink:0}
.mc-name{font-size:13px;font-weight:700}
.mc-body{padding:0 12px 10px}
.ebw{margin-bottom:5px}
.er{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text-x);margin-bottom:2px}
.er-r{display:flex;align-items:center;gap:4px}
.ed{font-weight:700;font-size:11px}
.eds{font-size:10px;color:var(--text-x)}
.ed.ok{color:var(--green)}.ed.w30{color:var(--yellow)}.ed.w7{color:var(--orange)}.ed.exp{color:var(--red)}
.ebar{height:4px;border-radius:3px;background:#EEE;overflow:hidden}
.efill{height:100%;border-radius:3px}
.efill.ok{background:var(--green-m)}.efill.w30{background:var(--yellow)}.efill.w7{background:var(--orange)}.efill.exp{background:var(--red)}
.upd{font-size:10px;color:var(--text-x);margin-bottom:5px}
.macts{display:flex;gap:5px}
.cbtn{flex:1;padding:6px;border-radius:7px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.cb-e{background:var(--green-l);color:var(--green)}
.cb-d{background:var(--teal-l);color:var(--teal)}
.cb-r{background:var(--red-l);color:var(--red)}

/* REPAIR LIST */
.rlist{display:flex;flex-direction:column;gap:10px}
.rrow{background:#fff;border-radius:var(--r);box-shadow:var(--sh);display:flex;align-items:stretch;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s}
.rrow:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.rr-photo{width:72px;flex-shrink:0;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
.rr-photo img{width:100%;height:100%;object-fit:cover}
.rr-main{flex:1;padding:10px 10px 9px;min-width:0}
.rr-nr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:6px}
.rr-name{font-size:14px;font-weight:700}
.rr-meta{font-size:11px;color:var(--text-x);margin-bottom:5px}
.rr-desc{font-size:12px;color:var(--text-m);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-chips{display:flex;flex-wrap:wrap;gap:3px}
.rr-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:10px 12px;flex-shrink:0;gap:4px}
.rr-amt{font-size:14px;font-weight:800;color:var(--green);white-space:nowrap}
.rr-cnt{font-size:10px;color:var(--text-x)}

.empty{text-align:center;padding:60px 20px;color:var(--text-x)}
.empty-e{font-size:44px;margin-bottom:10px}

/* SHEETS */
.sov{position:fixed;inset:0;background:rgba(28,28,28,.5);z-index:400;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.sov.open{opacity:1;pointer-events:all}
.bsheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:0 20px 30px;transform:translateY(100%);transition:transform .25s ease}
.sov.open .bsheet{transform:translateY(0)}
.sdrag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 16px}
.stitle{font-size:18px;font-weight:800;margin-bottom:3px}
.ssub{font-size:12px;color:var(--text-x);margin-bottom:16px}
.blist{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.bitem{background:var(--cream);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.bi-info{flex:1}
.bi-qty{font-size:14px;font-weight:700}
.bi-meta{font-size:11px;color:var(--text-x);margin-top:1px}
.bi-days{font-size:12px;font-weight:700;min-width:55px;text-align:right}
.bdel{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:var(--red-l);color:var(--red)}
.add-batch{width:100%;padding:10px;border-radius:10px;border:2px dashed var(--border);background:transparent;font-size:13px;font-weight:600;color:var(--text-x);cursor:pointer;margin-bottom:14px}
.add-batch:hover{border-color:var(--green-m);color:var(--green)}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.htitle{font-size:14px;font-weight:700}
.htotal{font-size:13px;font-weight:700;color:var(--green)}
.hlist{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.hitem{background:var(--cream);border-radius:10px;padding:10px 12px}
.h1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hdate{font-size:13px;font-weight:700}
.hamt{font-size:13px;font-weight:700;color:var(--green)}
.h2{display:flex;justify-content:space-between}
.hnote{font-size:11px;color:var(--text-x)}
.hby{font-size:11px;color:var(--text-x)}
.hacts{display:flex;gap:5px;margin-top:6px}
.hbtn{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.hbe{background:var(--green-l);color:var(--green)}
.hbd{background:var(--red-l);color:var(--red)}
.sinfo{background:var(--cream);border-radius:10px;padding:12px;margin-bottom:14px}
.ir{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.ir:last-child{border-bottom:none}
.il{color:var(--text-x);font-weight:600;flex-shrink:0;margin-right:12px}
.iv{text-align:right}
.sfoot{display:flex;gap:8px}
.sb-e{flex:1;padding:10px;border-radius:10px;background:var(--green-l);color:var(--green);border:none;font-size:13px;font-weight:700;cursor:pointer}
.sb-d{padding:10px 16px;border-radius:10px;background:var(--red-l);color:var(--red);border:none;font-size:13px;font-weight:700;cursor:pointer}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(28,28,28,.55);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:14px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:18px;width:100%;max-width:500px;padding:22px;box-shadow:var(--sh3);transform:translateY(16px);transition:transform .22s;margin:auto}
.ov.open .modal{transform:translateY(0)}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mtitle{font-size:16px;font-weight:800;color:var(--green)}
.mclose{width:28px;height:28px;border-radius:8px;border:none;background:var(--cream);cursor:pointer;font-size:16px;color:var(--text-m);display:flex;align-items:center;justify-content:center}
.pa{border:2px dashed var(--border);border-radius:12px;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;position:relative;overflow:hidden;background:var(--cream)}
.pa input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pa img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
.ph{font-size:11px;color:var(--text-x);text-align:center;pointer-events:none}
.ph .pi{font-size:20px;margin-bottom:2px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fr-full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:700;color:var(--text-x);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fi,.fsel2{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;color:var(--text);outline:none;background:#fff;transition:border-color .15s;font-family:inherit}
.fi:focus,.fsel2:focus{border-color:var(--green-m)}
.zsel{display:flex;gap:5px}
.zo{flex:1;padding:7px 4px;border-radius:9px;border:1.5px solid var(--border);background:var(--cream);cursor:pointer;text-align:center;font-size:11px;font-weight:600;color:var(--text-m);transition:all .15s}
.zo .zi{font-size:15px;display:block;margin-bottom:2px}
.zo.active{border-color:var(--green);background:var(--green-l);color:var(--green)}

/* TOGGLE BUTTONS */
.tg{display:flex;gap:8px}
.tb{flex:1;padding:10px 8px;border-radius:10px;border:2px solid var(--border);background:var(--cream);cursor:pointer;text-align:center;font-size:13px;font-weight:600;color:var(--text-m);transition:all .15s;display:block;width:100%;font-family:inherit}
.tb.ab{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.tb.ag{border-color:var(--gray);background:var(--gray-l);color:var(--gray)}
.tb.at{border-color:var(--teal);background:var(--teal-l);color:var(--teal)}
.tb.agr{border-color:var(--green);background:var(--green-l);color:var(--green)}
.tb.ao{border-color:var(--orange);background:var(--orange-l);color:var(--orange)}
.tb.ap{border-color:var(--purple);background:var(--purple-l);color:var(--purple)}

.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.bcn{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--text-m);cursor:pointer}
.bsv{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;border:none;background:var(--green);color:#fff;cursor:pointer}
.bsv:disabled{background:#aaa;cursor:not-allowed}
.sm{max-width:380px}

/* USER MODAL */
.umod{background:#fff;border-radius:18px;width:100%;max-width:340px;padding:22px;box-shadow:var(--sh3);margin:auto;transform:translateY(16px);transition:transform .22s}
.ov.open .umod{transform:translateY(0)}
.umod h2{font-size:16px;font-weight:800;color:var(--green);margin-bottom:4px}
.umod p{font-size:12px;color:var(--text-x);margin-bottom:14px}
.upre{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.upr{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--cream);font-size:13px;font-weight:600;cursor:pointer;color:var(--text-m)}
.upr.sel,.upr:hover{border-color:var(--green);background:var(--green-l);color:var(--green)}
.urow{display:flex;gap:8px}
.urow input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;outline:none;font-family:inherit}
.ucf{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:700;border:none;background:var(--green);color:#fff;cursor:pointer}

/* TOAST */
.toasts{position:fixed;bottom:18px;right:18px;z-index:600;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;box-shadow:var(--sh2);transform:translateX(120%);transition:transform .25s ease;max-width:250px}
.toast.show{transform:translateX(0)}
.tok{background:var(--green)}.twn{background:var(--orange)}.terr{background:var(--red)}

@media(max-width:560px){
  .mgrid{grid-template-columns:repeat(2,1fr);gap:10px}
  .fg{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="logo">🏡 家庭管家</div>
  <div class="hdr-r">
    <button class="usr-btn" onclick="openUserModal()">👤 <span id="uname">設定名字</span></button>
    <div class="sync off" id="syncBadge"><span class="sync-dot"></span><span id="syncTxt">連線中</span></div>
  </div>
</header>
<div class="main-tabs">
  <button class="main-tab active" id="tab-food" onclick="switchTab('food')">🥦 食材管理</button>
  <button class="main-tab" id="tab-maint" onclick="switchTab('maint')">🔧 耗材 / 保養</button>
  <button class="main-tab" id="tab-repair" onclick="switchTab('repair')">🛠️ 維修紀錄</button>
</div>
<main>
  <div class="load-scr" id="loadScr">
    <div class="spin"></div>
    <div>連接資料庫中…</div>
    <div class="load-err" id="loadErr"></div>
  </div>
  <!-- FOOD -->
  <div id="foodTab" style="display:none">

<script>
// ── FIREBASE REST ──
const DB = 'https://family-food-2ce0d-default-rtdb.firebaseio.com';

async function fbGet(p) {
  const r = await fetch(DB + '/' + p + '.json');
  if (!r.ok) throw new Error('GET ' + r.status);
  return r.json();
}
async function fbPush(p, d) {
  const r = await fetch(DB + '/' + p + '.json', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
  if (!r.ok) throw new Error('POST ' + r.status);
  return r.json();
}
async function fbPatch(p, d) {
  const r = await fetch(DB + '/' + p + '.json', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
  if (!r.ok) throw new Error('PATCH ' + r.status);
}
async function fbDel(p) {
  const r = await fetch(DB + '/' + p + '.json', {method:'DELETE'});
  if (!r.ok) throw new Error('DELETE ' + r.status);
}
function o2a(o) {
  if (!o) return [];
  return Object.entries(o).map(function(e) { return Object.assign({}, e[1], {_k: e[0]}); });
}

// ── STATE ──
var foods=[], maints=[], repairs=[], users=[];
var cu = localStorage.getItem('hg_user') || '';
var tab = 'food';
var az='', ah='', amh='', fMode='';
var pBuf = {food:null, maint:null, repair:null};
var eFoodK=null, eMaintK=null, eRepairK=null;
var fdK=null, mdK=null, rdK=null;
var doneK=null, batchK=null, rlogK=null;
var heType=null, heIK=null, heRK=null;
var poll=null;

const ZI = {'冷凍':'❄️','冷藏':'🌡️','常溫':'🏠'};
const CE = {'肉類':'🥩','魚類':'🐟','海鮮':'🦐','蔬菜':'🥦','水果':'🍎','乳製品':'🥛','蛋類':'🥚','主食':'🍚','調味料':'🧂','飲料':'🧃','零食':'🍪','麵包':'🍞'};
const ME = {'濾芯':'💧','濾網':'🌀','電池':'🔋','燈泡':'💡','清潔':'🧹','冷氣':'❄️','熱水器':'🚿'};
const RE = {'家電':'🔌','水電':'🔧','木工':'🪚','冷氣':'❄️','熱水器':'🚿','網路':'📡','油漆':'🎨','地板':'🏠'};

if (cu) document.getElementById('uname').textContent = cu;
else setTimeout(openUserModal, 600);

// ── INIT ──
async function init() {
  try {
    var res = await Promise.all([fbGet('foods_v2'), fbGet('maints_v2'), fbGet('repairs'), fbGet('users')]);
    foods = o2a(res[0]);
    maints = o2a(res[1]);
    repairs = o2a(res[2]);
    users = res[3] ? Object.values(res[3]) : [];
    if (foods.length === 0) await seed();
    document.getElementById('loadScr').style.display = 'none';
    showTab(tab);
    setSynced(true);
    renderFood(); renderMaint(); renderRepair(); buildUPre();
    poll = setInterval(refresh, 30000);
  } catch(e) {
    document.getElementById('loadErr').textContent = '連線失敗：' + e.message + '，請重新整理';
  }
}

async function refresh() {
  try {
    var res = await Promise.all([fbGet('foods_v2'), fbGet('maints_v2'), fbGet('repairs'), fbGet('users')]);

// ── UTILS ──
function dl(e) { if (!e) return null; return Math.floor((new Date(e) - new Date()) / 86400000); }
function ec(d) { if (d===null) return 'none'; if (d<0) return 'exp'; if (d<=7) return 'w7'; if (d<=30) return 'w30'; return 'ok'; }
function et(d) { if (d===null) return '未設定'; if (d<0) return '過期'+Math.abs(d)+'天'; if (d===0) return '今天到期'; if (d===1) return '明天'; return '剩'+d+'天'; }
function fd(s) { if (!s) return ''; var p=s.split('-'); return parseInt(p[1])+'/'+parseInt(p[2]); }
function ff(s) { if (!s) return ''; var p=s.split('-'); return p[0]+'/'+parseInt(p[1])+'/'+parseInt(p[2]); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ta(ts) { if (!ts) return ''; var d=Math.floor((Date.now()-ts)/1000); if (d<60) return '剛剛'; if (d<3600) return Math.floor(d/60)+'分鐘前'; if (d<86400) return Math.floor(d/3600)+'小時前'; return Math.floor(d/86400)+'天前'; }
function td() { return new Date().toISOString().slice(0,10); }
function gBatches(f) { if (!f.batches) return []; return Object.entries(f.batches).map(function(e){return Object.assign({},e[1],{_bk:e[0]});}); }
function gEB(f) { var bs=gBatches(f).filter(function(b){return b.expiry;}); if (!bs.length) return gBatches(f)[0]||null; return bs.sort(function(a,b){return new Date(a.expiry)-new Date(b.expiry);})[0]; }
function gQty(f) {
  var bs=gBatches(f); if (!bs.length) return '—';
  var p=bs.map(function(b){return b.qty||'';}).filter(Boolean);
  if (p.length===1) return p[0];
  var m=p.map(function(x){return x.match(/^([\d.]+)\s*(.*)$/);});
  if (m.every(function(x){return x&&x[2]===m[0][2];})) {
    var s=m.reduce(function(a,x){return a+parseFloat(x[1]);},0);
    return (Number.isInteger(s)?s:s.toFixed(1))+m[0][2];
  }
  return p.join('+');
}
function gHist(item, path) {
  if (!item[path]) return [];
  return Object.entries(item[path]).map(function(e){return Object.assign({},e[1],{_hk:e[0]});});
}
function mNext(item) {
  if (!item.lastDate||!item.cycle) return null;
  var d=new Date(item.lastDate); d.setDate(d.getDate()+parseInt(item.cycle));
  return d.toISOString().slice(0,10);
}
function mDL(item) { var n=mNext(item); return n ? dl(n) : null; }

// ── PHOTO ──
function handlePh(input, prevId, hintId, type) {
  var file=input.files[0]; if (!file) return;
  var canvas=document.createElement('canvas'); var img=new Image(); var url=URL.createObjectURL(file);
  img.onload=function(){
    var MAX=600; var w=img.width,h=img.height;
    if (w>h&&w>MAX){h=h*MAX/w;w=MAX;}else if(h>MAX){w=w*MAX/h;h=MAX;}
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    var buf=canvas.toDataURL('image/jpeg',.75);
    pBuf[type]=buf; setPrev(prevId,hintId,buf); URL.revokeObjectURL(url);
  };
  img.src=url;
}
function setPrev(prevId,hintId,buf) {
  var p=document.getElementById(prevId),h=document.getElementById(hintId);
  if (buf){p.src=buf;p.style.display='block';h.style.display='none';}
  else{p.style.display='none';h.style.display='flex';}
}

function tgl(gid, btn, activeClass, inactiveClass) {
  var g=document.getElementById(gid); if (!g) return;
  g.querySelectorAll('.tb').forEach(function(b){b.classList.remove(activeClass,inactiveClass);});
  btn.classList.add(activeClass);
  g.querySelectorAll('.tb').forEach(function(b){if(b!==btn)b.classList.add(inactiveClass);});
}
function setTgl(gid, val, classMap) {
  var g=document.getElementById(gid); if (!g) return;
  g.querySelectorAll('.tb').forEach(function(b){
    var v=b.getAttribute('data-v');
    Object.values(classMap).forEach(function(c){b.classList.remove(c);});
    if (v===val&&classMap[v]) b.classList.add(classMap[v]);
  });
}
function getTgl(gid) {
  var g=document.getElementById(gid); if (!g) return null;
  var btns=g.querySelectorAll('.tb');
  for (var i=0;i<btns.length;i++){
    var cls=btns[i].className;
    if (cls.indexOf(' a')>=0||cls.indexOf(' a')===cls.indexOf('tb ')+3) {
      var hasCls=false;
      ['ab','ag','at','agr','ao','ap'].forEach(function(c){if(btns[i].classList.contains(c))hasCls=true;});
      if (hasCls) return btns[i].getAttribute('data-v');
    }
  }
  return null;
}
function selZone(el) { document.querySelectorAll('.zo').forEach(function(o){o.classList.remove('active');}); el.classList.add('active'); }

// ── FILTERS ──
function setZone(el) { fMode=''; az=el.getAttribute('data-zone'); document.querySelectorAll('[data-zone]').forEach(function(t){t.classList.remove('active');}); el.classList.add('active'); renderFood(); }
function setHouse(el) { fMode=''; ah=el.getAttribute('data-house'); document.querySelectorAll('[data-house]').forEach(function(t){t.classList.remove('active','hact');}); el.classList.add('hact'); renderFood(); }
function setMH(el) { amh=el.getAttribute('data-mh'); document.querySelectorAll('[data-mh]').forEach(function(t){t.classList.remove('active','hact');}); el.classList.add('hact'); renderMaint(); }

// ── USER ──
function openUserModal() { document.getElementById('userOv').classList.add('open'); document.getElementById('uInp').value=cu; buildUPre(); }
function saveUser() {
  var name=document.getElementById('uInp').value.trim(); if (!name) { toast('請輸入名字','terr'); return; }
  cu=name; localStorage.setItem('hg_user',name);
  document.getElementById('uname').textContent=name;
  document.getElementById('userOv').classList.remove('open');
  fbPush('users',name); toast('歡迎，'+name+'！','tok');
}
function buildUPre() {
  var saved=localStorage.getItem('hg_user');
  var un=[...new Set(users)].filter(Boolean).slice(0,8);
  document.getElementById('uPre').innerHTML=un.map(function(u){return '<div class="upr'+(u===saved?' sel':'')+'" onclick="pickU(\''+esc(u)+'\')">'+esc(u)+'</div>';}).join('');
}
function pickU(name) { document.getElementById('uInp').value=name; document.querySelectorAll('.upr').forEach(function(p){p.classList.toggle('sel',p.textContent===name);}); }

// ── TOAST ──
function toast(msg, cls) {
  var el=document.createElement('div'); el.className='toast '+cls; el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('show');});});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},350);},2800);
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    ['foodOv','maintOv','repairOv','batchOv','doneOv','heOv','rlogOv','userOv'].forEach(function(id){document.getElementById(id).classList.remove('open');});
    ['foodSheet','maintSheet','repairSheet'].forEach(function(id){document.getElementById(id).classList.remove('open');});
  }
});

init();
</script>
