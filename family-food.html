<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭管家</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F4EF; --white: #FFFFFF;
  --green: #3A6B4A; --green-mid: #5A8F6A; --green-light: #EAF2EC;
  --orange: #D4621A; --orange-light: #FDF0E8;
  --red: #C0392B; --red-light: #FEF2F2;
  --yellow: #D4A017; --yellow-light: #FFFBEB;
  --blue: #2563EB; --blue-light: #EFF6FF;
  --teal: #0D9488; --teal-light: #F0FDFA;
  --purple: #7C3AED; --purple-light: #F5F3FF;
  --gray: #6B7280; --gray-light: #F3F4F6;
  --text: #1C1C1C; --text-mid: #4A4A4A; --text-muted: #888;
  --border: #E4DDD4;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.07);
  --shadow: 0 3px 12px rgba(0,0,0,.09);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.15);
  --radius: 14px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

header { background: var(--green); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 10px rgba(0,0,0,.18); }
.logo { font-size: 16px; font-weight: 700; color: white; display: flex; align-items: center; gap: 7px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.sync-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.sync-badge.online { background: rgba(255,255,255,.15); color: #A7F3D0; }
.sync-badge.offline { background: rgba(255,100,100,.2); color: #FCA5A5; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-badge.online .sync-dot { background: #34D399; animation: pulse 2s infinite; }
.sync-badge.offline .sync-dot { background: #F87171; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.user-btn { background: rgba(255,255,255,.2); color: white; border: none; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }

.main-tabs { background: var(--green); display: flex; padding: 0 16px 12px; gap: 8px; }
.main-tab { flex: 1; padding: 8px 4px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; text-align: center; transition: all .15s; line-height: 1.3; }
.main-tab.active { background: white; color: var(--green); }
.main-tab:not(.active) { background: rgba(255,255,255,.15); color: rgba(255,255,255,.85); }

main { max-width: 900px; margin: 0 auto; padding: 16px 14px 60px; }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; color: var(--text-muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.stats { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.stat { background: var(--white); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow-sm); flex: 1; min-width: 75px; cursor: pointer; transition: box-shadow .15s; }
.stat:hover { box-shadow: var(--shadow); }
.stat-num { font-size: 20px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-top: 3px; }
.stat.green .stat-num { color: var(--green); }
.stat.orange .stat-num { color: var(--orange); }
.stat.red .stat-num { color: var(--red); }
.stat.teal .stat-num { color: var(--teal); }

.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
.search-wrap { position: relative; flex: 1; min-width: 130px; }
.search-wrap input { width: 100%; padding: 8px 12px 8px 30px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--white); outline: none; color: var(--text); transition: border-color .15s; }
.search-wrap input:focus { border-color: var(--green-mid); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 13px; }
.filter-select { padding: 7px 9px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 12px; background: var(--white); outline: none; color: var(--text); cursor: pointer; }
.btn-add { background: var(--green); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-add:hover { background: #2F5840; }

.filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.ftab { padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--text-mid); transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 3px; }
.ftab.active { color: white; border-color: transparent; background: var(--green); }
.ftab.hactive { color: white; border-color: transparent; background: var(--blue); }
.ftab-cnt { font-size: 10px; padding: 1px 5px; border-radius: 10px; background: var(--green-light); color: var(--green); }
.ftab.active .ftab-cnt, .ftab.hactive .ftab-cnt { background: rgba(255,255,255,.25); color: white; }

/* FOOD LIST */
.food-list { display: flex; flex-direction: column; gap: 10px; }
.food-row { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); display: flex; align-items: stretch; overflow: hidden; cursor: pointer; transition: box-shadow .15s, transform .15s; position: relative; }
.food-row:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.food-row-photo { width: 80px; flex-shrink: 0; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 34px; overflow: hidden; }
.food-row-photo img { width: 100%; height: 100%; object-fit: cover; }
.food-row-main { flex: 1; padding: 10px 10px 9px; min-width: 0; }
.food-row-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; gap: 6px; }
.food-row-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
.batch-cnt-badge { font-size: 10px; color: var(--text-muted); }
.house-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
.house-tag-new { background: var(--blue); color: white; }
.house-tag-old { background: var(--gray); color: white; }

.quick-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
.qty-btn { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; color: var(--text-mid); transition: all .12s; font-weight: 700; flex-shrink: 0; }
.qty-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
.qty-btn.minus:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
.qty-total { font-size: 12px; font-weight: 700; color: var(--text); min-width: 30px; text-align: center; }
.btn-used-up { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; border: none; background: var(--red-light); color: var(--red); cursor: pointer; white-space: nowrap; }

.food-row-chips { display: flex; flex-wrap: wrap; gap: 3px; }
.chip { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 600; }
.chip-zone { background: var(--green-light); color: var(--green); }
.chip-open { background: var(--teal-light); color: var(--teal); }
.chip-sealed { background: var(--green-light); color: var(--green); }
.chip-loc { background: #EEF2FF; color: #4338CA; }
.chip-maint { background: var(--teal-light); color: var(--teal); }
.chip-type-replace { background: var(--orange-light); color: var(--orange); }
.chip-type-maint { background: var(--purple-light); color: var(--purple); }
.chip-warranty { background: var(--green-light); color: var(--green); }
.chip-warranty-exp { background: var(--red-light); color: var(--red); }

.days-circle-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 12px; flex-shrink: 0; min-width: 64px; }
.days-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 3px; }
.days-circle.ok { background: var(--green-light); }
.days-circle.warn30 { background: var(--yellow-light); }
.days-circle.warn7 { background: var(--orange-light); }
.days-circle.expired { background: var(--red-light); }
.days-circle.none { background: var(--gray-light); }
.days-num { font-size: 15px; font-weight: 900; line-height: 1; }
.days-circle.ok .days-num { color: var(--green); }
.days-circle.warn30 .days-num { color: var(--yellow); }
.days-circle.warn7 .days-num { color: var(--orange); }
.days-circle.expired .days-num { color: var(--red); }
.days-circle.none .days-num { color: var(--gray); }
.days-unit { font-size: 9px; font-weight: 600; opacity: .8; }
.days-date { font-size: 9px; color: var(--text-muted); text-align: center; }

/* MAINT CARDS */
.food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; }
.maint-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow .18s, transform .18s; cursor: pointer; }
.maint-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.maint-photo { width: 100%; aspect-ratio: 16/9; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 36px; overflow: hidden; }
.maint-photo img { width: 100%; height: 100%; object-fit: cover; }
.maint-top { padding: 10px 12px 6px; }
.maint-icon-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
.maint-icon { font-size: 22px; flex-shrink: 0; }
.maint-name { font-size: 13px; font-weight: 700; }
.maint-body { padding: 0 12px 10px; }
.expiry-bar-wrap { margin-bottom: 5px; }
.expiry-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
.expiry-right { display: flex; align-items: center; gap: 4px; }
.expiry-days { font-weight: 700; font-size: 11px; }
.expiry-date-small { font-size: 10px; color: var(--text-muted); }
.expiry-days.ok { color: var(--green); }
.expiry-days.warn30 { color: var(--yellow); }
.expiry-days.warn7 { color: var(--orange); }
.expiry-days.expired { color: var(--red); }
.ebar { height: 4px; border-radius: 3px; background: #EEE; overflow: hidden; }
.efill { height: 100%; border-radius: 3px; }
.efill.ok { background: var(--green-mid); }
.efill.warn30 { background: var(--yellow); }
.efill.warn7 { background: var(--orange); }
.efill.expired { background: var(--red); }
.card-updated { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }
.maint-actions { display: flex; gap: 5px; }
.card-btn { flex: 1; padding: 6px; border-radius: 7px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; }
.card-btn-edit { background: var(--green-light); color: var(--green); }
.card-btn-done { background: var(--teal-light); color: var(--teal); }
.card-btn-del { background: var(--red-light); color: var(--red); }

/* REPAIR LIST */
.repair-list { display: flex; flex-direction: column; gap: 10px; }
.repair-row { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); display: flex; align-items: stretch; overflow: hidden; cursor: pointer; transition: box-shadow .15s, transform .15s; position: relative; }
.repair-row:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.repair-photo { width: 72px; flex-shrink: 0; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden; }
.repair-photo img { width: 100%; height: 100%; object-fit: cover; }
.repair-main { flex: 1; padding: 10px 10px 9px; min-width: 0; }
.repair-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; gap: 6px; }
.repair-name { font-size: 14px; font-weight: 700; }
.repair-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
.repair-desc { font-size: 12px; color: var(--text-mid); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.repair-chips { display: flex; flex-wrap: wrap; gap: 3px; }
.repair-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; padding: 10px 12px; flex-shrink: 0; gap: 4px; }
.repair-amount { font-size: 14px; font-weight: 800; color: var(--green); white-space: nowrap; }
.repair-date { font-size: 10px; color: var(--text-muted); }

.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-emoji { font-size: 44px; margin-bottom: 10px; }

/* SHEETS */
.sheet-overlay { position: fixed; inset: 0; background: rgba(28,28,28,.5); z-index: 400; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.bottom-sheet { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 88vh; overflow-y: auto; padding: 0 20px 30px; transform: translateY(100%); transition: transform .25s ease; }
.sheet-overlay.open .bottom-sheet { transform: translateY(0); }
.sheet-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 16px; }
.sheet-title { font-size: 18px; font-weight: 800; margin-bottom: 3px; }
.sheet-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.batch-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.batch-item { background: var(--cream); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
.batch-info { flex: 1; }
.batch-qty { font-size: 14px; font-weight: 700; }
.batch-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.batch-days { font-size: 12px; font-weight: 700; min-width: 55px; text-align: right; }
.batch-del { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; background: var(--red-light); color: var(--red); }
.btn-add-batch { width: 100%; padding: 10px; border-radius: 10px; border: 2px dashed var(--border); background: transparent; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; margin-bottom: 14px; }
.btn-add-batch:hover { border-color: var(--green-mid); color: var(--green); }
.history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.history-title { font-size: 14px; font-weight: 700; }
.history-total { font-size: 13px; font-weight: 700; color: var(--green); }
.history-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.history-item { background: var(--cream); border-radius: 10px; padding: 10px 12px; }
.history-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.history-date { font-size: 13px; font-weight: 700; }
.history-amount { font-size: 13px; font-weight: 700; color: var(--green); }
.history-row2 { display: flex; justify-content: space-between; }
.history-note { font-size: 11px; color: var(--text-muted); }
.history-by { font-size: 11px; color: var(--text-muted); }
.history-actions { display: flex; gap: 5px; margin-top: 6px; }
.history-btn { padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; }
.history-btn-edit { background: var(--green-light); color: var(--green); }
.history-btn-del { background: var(--red-light); color: var(--red); }
.sheet-info { background: var(--cream); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
.info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--text-muted); font-weight: 600; flex-shrink: 0; margin-right: 12px; }
.info-val { text-align: right; }
.sheet-footer { display: flex; gap: 8px; }
.btn-sheet-edit { flex: 1; padding: 10px; border-radius: 10px; background: var(--green-light); color: var(--green); border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-sheet-del { padding: 10px 16px; border-radius: 10px; background: var(--red-light); color: var(--red); border: none; font-size: 13px; font-weight: 700; cursor: pointer; }

/* MODALS */
.overlay { position: fixed; inset: 0; background: rgba(28,28,28,.55); z-index: 300; display: flex; align-items: flex-start; justify-content: center; padding: 14px; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity .2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 500px; padding: 22px; box-shadow: var(--shadow-lg); transform: translateY(16px); transition: transform .22s; margin: auto; }
.overlay.open .modal { transform: translateY(0); }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.modal-title { font-size: 16px; font-weight: 800; color: var(--green); }
.modal-close { width: 28px; height: 28px; border-radius: 8px; border: none; background: var(--cream); cursor: pointer; font-size: 16px; color: var(--text-mid); display: flex; align-items: center; justify-content: center; }
.photo-area { border: 2px dashed var(--border); border-radius: 12px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 12px; position: relative; overflow: hidden; background: var(--cream); }
.photo-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.photo-hint { font-size: 11px; color: var(--text-muted); text-align: center; pointer-events: none; }
.photo-hint .icon { font-size: 20px; margin-bottom: 2px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.form-row.full { grid-column: 1/-1; }
label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
.form-input, .form-select { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; color: var(--text); outline: none; background: var(--white); transition: border-color .15s; font-family: inherit; }
.form-input:focus, .form-select:focus { border-color: var(--green-mid); }
.zone-selector { display: flex; gap: 5px; }
.zone-opt { flex: 1; padding: 7px 4px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--cream); cursor: pointer; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-mid); transition: all .15s; }
.zone-opt .zicon { font-size: 15px; display: block; margin-bottom: 2px; }
.zone-opt.active { border-color: var(--green); background: var(--green-light); color: var(--green); }

/* TOGGLE BUTTONS - 重寫確保可點擊 */
.toggle-group { display: flex; gap: 8px; }
.tgl-btn {
  flex: 1; padding: 10px 8px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--cream);
  cursor: pointer; text-align: center; font-size: 13px; font-weight: 600;
  color: var(--text-mid); transition: all .15s;
  user-select: none; -webkit-user-select: none;
  display: block; width: 100%;
}
.tgl-btn.active-blue { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.tgl-btn.active-gray { border-color: var(--gray); background: var(--gray-light); color: var(--gray); }
.tgl-btn.active-teal { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }
.tgl-btn.active-green { border-color: var(--green); background: var(--green-light); color: var(--green); }
.tgl-btn.active-orange { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }
.tgl-btn.active-purple { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }

.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
.btn-cancel { padding: 8px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--white); color: var(--text-mid); cursor: pointer; }
.btn-save { padding: 8px 18px; border-radius: 9px; font-size: 13px; font-weight: 700; border: none; background: var(--green); color: white; cursor: pointer; }
.btn-save:disabled { background: #aaa; cursor: not-allowed; }
.sm-modal { max-width: 380px; }

.user-modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 340px; padding: 22px; box-shadow: var(--shadow-lg); margin: auto; transform: translateY(16px); transition: transform .22s; }
.overlay.open .user-modal { transform: translateY(0); }
.user-modal h2 { font-size: 16px; font-weight: 800; color: var(--green); margin-bottom: 4px; }
.user-modal p { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.user-presets { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.user-preset { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--cream); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-mid); }
.user-preset.selected { border-color: var(--green); background: var(--green-light); color: var(--green); }
.user-input-row { display: flex; gap: 8px; }
.user-input-row input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; outline: none; font-family: inherit; }
.btn-confirm { padding: 8px 14px; border-radius: 9px; font-size: 13px; font-weight: 700; border: none; background: var(--green); color: white; cursor: pointer; }

.toasts { position: fixed; bottom: 18px; right: 18px; z-index: 600; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; color: white; box-shadow: var(--shadow); transform: translateX(120%); transition: transform .25s ease; max-width: 250px; }
.toast.show { transform: translateX(0); }
.toast.ok { background: var(--green); }
.toast.warn { background: var(--orange); }
.toast.err { background: var(--red); }

@media (max-width: 560px) {
  .food-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🏡 家庭管家</div>
  <div class="header-right">
    <button class="user-btn" onclick="openUserModal()">👤 <span id="userNameDisplay">設定名字</span></button>
    <div class="sync-badge offline" id="syncBadge"><span class="sync-dot"></span><span id="syncText">連線中</span></div>
  </div>
</header>

<div class="main-tabs">
  <button class="main-tab active" id="tab-food" onclick="switchTab('food')">🥦 食材管理</button>
  <button class="main-tab" id="tab-maint" onclick="switchTab('maint')">🔧 耗材 / 保養</button>
  <button class="main-tab" id="tab-repair" onclick="switchTab('repair')">🛠️ 維修紀錄</button>
</div>

<main>
  <div class="loading-screen" id="loadingScreen"><div class="spinner"></div><div>連接資料庫中…</div><div id="loadingError" style="display:none;font-size:12px;color:var(--red);max-width:300px;text-align:center;margin-top:8px"></div></div>

  <!-- FOOD -->
  <div id="foodTab" style="display:none">
    <div class="stats">
      <div class="stat green"><div class="stat-num" id="sTotal">0</div><div class="stat-label">食材</div></div>
      <div class="stat teal"><div class="stat-num" id="sOpened">0</div><div class="stat-label">已開封</div></div>
      <div class="stat orange" onclick="filterWarn()"><div class="stat-num" id="sWarn">0</div><div class="stat-label">1個月內到期</div></div>
      <div class="stat red" onclick="filterExpired()"><div class="stat-num" id="sExpired">0</div><div class="stat-label">已過期</div></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜尋食材…" oninput="renderFood()"></div>
      <select class="filter-select" id="catFilter" onchange="renderFood()"><option value="">全部類別</option></select>
      <select class="filter-select" id="sortSel" onchange="renderFood()">
        <option value="expiry">依到期日</option>
        <option value="name">依名稱</option>
        <option value="zone">依溫層</option>
        <option value="updated">最新更新</option>
      </select>
      <button class="btn-add" onclick="openFoodModal()">＋ 新增</button>
    </div>
    <div class="filter-row">
      <div class="ftab active" data-zone="" onclick="setZone(this)">全部 <span class="ftab-cnt" id="cnt-all">0</span></div>
      <div class="ftab" data-zone="冷凍" onclick="setZone(this)">❄️冷凍 <span class="ftab-cnt" id="cnt-冷凍">0</span></div>
      <div class="ftab" data-zone="冷藏" onclick="setZone(this)">🌡️冷藏 <span class="ftab-cnt" id="cnt-冷藏">0</span></div>
      <div class="ftab" data-zone="常溫" onclick="setZone(this)">🏠常溫 <span class="ftab-cnt" id="cnt-常溫">0</span></div>
    </div>
    <div class="filter-row">
      <div class="ftab active" data-house="" onclick="setHouse(this)">全部地點 <span class="ftab-cnt" id="hcnt-all">0</span></div>
      <div class="ftab" data-house="新家" onclick="setHouse(this)">🏠新家 <span class="ftab-cnt" id="hcnt-新家">0</span></div>
      <div class="ftab" data-house="舊家" onclick="setHouse(this)">🏡舊家 <span class="ftab-cnt" id="hcnt-舊家">0</span></div>
    </div>
    <div class="food-list" id="foodList"></div>
  </div>

  <!-- MAINT -->
  <div id="maintTab" style="display:none">
    <div class="stats">
      <div class="stat green"><div class="stat-num" id="msTotal">0</div><div class="stat-label">耗材</div></div>
      <div class="stat orange"><div class="stat-num" id="msWarn">0</div><div class="stat-label">7天內需換</div></div>
      <div class="stat red"><div class="stat-num" id="msExpired">0</div><div class="stat-label">應換未換</div></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="mSearchInput" placeholder="搜尋耗材…" oninput="renderMaint()"></div>
      <select class="filter-select" id="mCatFilter" onchange="renderMaint()"><option value="">全部類別</option></select>
      <button class="btn-add" onclick="openMaintModal()">＋ 新增</button>
    </div>
    <div class="filter-row">
      <div class="ftab active" data-mhouse="" onclick="setMHouse(this)">全部地點 <span class="ftab-cnt" id="mhcnt-all">0</span></div>
      <div class="ftab" data-mhouse="新家" onclick="setMHouse(this)">🏠新家 <span class="ftab-cnt" id="mhcnt-新家">0</span></div>
      <div class="ftab" data-mhouse="舊家" onclick="setMHouse(this)">🏡舊家 <span class="ftab-cnt" id="mhcnt-舊家">0</span></div>
    </div>
    <div class="food-grid" id="maintGrid"></div>
  </div>

  <!-- REPAIR -->
  <div id="repairTab" style="display:none">
    <div class="stats">
      <div class="stat green"><div class="stat-num" id="rsTotal">0</div><div class="stat-label">維修紀錄</div></div>
      <div class="stat teal"><div class="stat-num" id="rsWarranty">0</div><div class="stat-label">保固中</div></div>
      <div class="stat orange"><div class="stat-num" id="rsWarrantyExp">0</div><div class="stat-label">保固即期</div></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="rSearchInput" placeholder="搜尋維修項目…" oninput="renderRepair()"></div>
      <select class="filter-select" id="rCatFilter" onchange="renderRepair()"><option value="">全部類別</option></select>
      <select class="filter-select" id="rLocFilter" onchange="renderRepair()">
        <option value="">全部地點</option>
        <option value="新家">🏠新家</option>
        <option value="舊家">🏡舊家</option>
      </select>
      <button class="btn-add" onclick="openRepairModal()">＋ 新增</button>
    </div>
    <div class="repair-list" id="repairList"></div>
  </div>
</main>

<!-- FOOD DETAIL SHEET -->
<div class="sheet-overlay" id="foodSheet" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="bottom-sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-title" id="fdTitle"></div>
    <div class="sheet-sub" id="fdSub"></div>
    <div class="batch-list" id="fdBatchList"></div>
    <button class="btn-add-batch" onclick="openBatchModal()">＋ 新增批次</button>
    <div class="sheet-info" id="fdInfo"></div>
    <div class="sheet-footer">
      <button class="btn-sheet-edit" onclick="editFoodFromSheet()">編輯資料</button>
      <button class="btn-sheet-del" onclick="deleteFoodFromSheet()">刪除</button>
    </div>
  </div>
</div>

<!-- MAINT DETAIL SHEET -->
<div class="sheet-overlay" id="maintSheet" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="bottom-sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-title" id="mdTitle"></div>
    <div class="sheet-sub" id="mdSub"></div>
    <div class="history-header"><div class="history-title">歷史紀錄</div><div class="history-total" id="mdTotal"></div></div>
    <div class="history-list" id="mdHistoryList"></div>
    <button class="btn-add-batch" id="mdAddBtn" onclick="openDoneModal()">＋ 記錄本次</button>
    <div class="sheet-info" id="mdInfo"></div>
    <div class="sheet-footer">
      <button class="btn-sheet-edit" onclick="editMaintFromSheet()">編輯資料</button>
      <button class="btn-sheet-del" onclick="deleteMaintFromSheet()">刪除</button>
    </div>
  </div>
</div>

<!-- REPAIR DETAIL SHEET -->
<div class="sheet-overlay" id="repairSheet" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="bottom-sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-title" id="rdTitle"></div>
    <div class="sheet-sub" id="rdSub"></div>
    <div class="history-header"><div class="history-title">維修歷史</div><div class="history-total" id="rdTotal"></div></div>
    <div class="history-list" id="rdHistoryList"></div>
    <button class="btn-add-batch" onclick="openRepairLogModal()">＋ 新增維修紀錄</button>
    <div class="sheet-info" id="rdInfo"></div>
    <div class="sheet-footer">
      <button class="btn-sheet-edit" onclick="editRepairFromSheet()">編輯資料</button>
      <button class="btn-sheet-del" onclick="deleteRepairFromSheet()">刪除</button>
    </div>
  </div>
</div>

<!-- FOOD MODAL -->
<div class="overlay" id="foodOverlay" onclick="if(event.target===this)closeFoodModal()">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title" id="foodModalTitle">新增食材</div><button class="modal-close" onclick="closeFoodModal()">✕</button></div>
    <div class="photo-area"><input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(this,'fPhotoPreview','fPhotoHint','food')"><div class="photo-hint" id="fPhotoHint"><div class="icon">📷</div><div>點擊上傳照片</div></div><img id="fPhotoPreview" style="display:none"></div>
    <div class="form-grid">
      <div class="form-row full"><label>食材名稱 *</label><input class="form-input" type="text" id="fName" placeholder="例：雞胸肉"></div>
      <div class="form-row full">
        <label>溫層 *</label>
        <div class="zone-selector">
          <div class="zone-opt active" data-z="冷凍" onclick="selZone(this)"><span class="zicon">❄️</span>冷凍</div>
          <div class="zone-opt" data-z="冷藏" onclick="selZone(this)"><span class="zicon">🌡️</span>冷藏</div>
          <div class="zone-opt" data-z="常溫" onclick="selZone(this)"><span class="zicon">🏠</span>常溫</div>
        </div>
      </div>
      <div class="form-row full">
        <label>地點</label>
        <div class="toggle-group" id="fHouseGroup">
          <button type="button" class="tgl-btn active-blue" data-val="新家" onclick="toggleGroup('fHouseGroup',this)">🏠 新家</button>
          <button type="button" class="tgl-btn" data-val="舊家" onclick="toggleGroup('fHouseGroup',this)">🏡 舊家</button>
        </div>
      </div>
      <div class="form-row full">
        <label>開封狀態</label>
        <div class="toggle-group" id="fOpenGroup">
          <button type="button" class="tgl-btn active-green" data-val="未開封" onclick="toggleGroup('fOpenGroup',this)">🔒 未開封</button>
          <button type="button" class="tgl-btn" data-val="已開封" onclick="toggleGroup('fOpenGroup',this)">📦 已開封</button>
        </div>
      </div>
      <div class="form-row"><label>類別</label><input class="form-input" type="text" id="fCat" placeholder="例：肉類" list="catDL"><datalist id="catDL"></datalist></div>
      <div class="form-row"><label>細部位置</label><input class="form-input" type="text" id="fLoc" placeholder="例：上層"></div>
      <div class="form-row"><label>數量（首批）</label><input class="form-input" type="text" id="fQty" placeholder="例：3包"></div>
      <div class="form-row"><label>保存期限（首批）</label><input class="form-input" type="date" id="fExpiry"></div>
      <div class="form-row"><label>購買日（選填）</label><input class="form-input" type="date" id="fBuyDate"></div>
      <div class="form-row"><label>開封日（選填）</label><input class="form-input" type="date" id="fOpenDate"></div>
      <div class="form-row full"><label>備註</label><input class="form-input" type="text" id="fNote" placeholder="料理建議…"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeFoodModal()">取消</button><button class="btn-save" id="foodSaveBtn" onclick="saveFood()">儲存</button></div>
  </div>
</div>

<!-- BATCH MODAL -->
<div class="overlay" id="batchOverlay" onclick="if(event.target===this)closeBatchModal()">
  <div class="modal sm-modal">
    <div class="modal-hdr"><div class="modal-title" id="batchModalTitle">新增批次</div><button class="modal-close" onclick="closeBatchModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-row"><label>數量</label><input class="form-input" type="text" id="bQty" placeholder="例：2包"></div>
      <div class="form-row"><label>保存期限</label><input class="form-input" type="date" id="bExpiry"></div>
      <div class="form-row full"><label>備註</label><input class="form-input" type="text" id="bNote" placeholder="購買地點…"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeBatchModal()">取消</button><button class="btn-save" onclick="saveBatch()">新增</button></div>
  </div>
</div>

<!-- MAINT MODAL -->
<div class="overlay" id="maintOverlay" onclick="if(event.target===this)closeMaintModal()">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title" id="maintModalTitle">新增耗材</div><button class="modal-close" onclick="closeMaintModal()">✕</button></div>
    <div class="photo-area"><input type="file" id="mPhotoInput" accept="image/*" onchange="handlePhoto(this,'mPhotoPreview','mPhotoHint','maint')"><div class="photo-hint" id="mPhotoHint"><div class="icon">📷</div><div>點擊上傳照片</div></div><img id="mPhotoPreview" style="display:none"></div>
    <div class="form-grid">
      <div class="form-row full"><label>品項名稱 *</label><input class="form-input" type="text" id="mName" placeholder="例：濾水器濾芯"></div>
      <div class="form-row full">
        <label>類型</label>
        <div class="toggle-group" id="mTypeGroup">
          <button type="button" class="tgl-btn active-orange" data-val="更換" onclick="toggleGroup('mTypeGroup',this)">🔄 更換</button>
          <button type="button" class="tgl-btn" data-val="保養" onclick="toggleGroup('mTypeGroup',this)">🛠️ 保養</button>
        </div>
      </div>
      <div class="form-row full">
        <label>地點</label>
        <div class="toggle-group" id="mHouseGroup">
          <button type="button" class="tgl-btn active-blue" data-val="新家" onclick="toggleGroup('mHouseGroup',this)">🏠 新家</button>
          <button type="button" class="tgl-btn" data-val="舊家" onclick="toggleGroup('mHouseGroup',this)">🏡 舊家</button>
        </div>
      </div>
      <div class="form-row"><label>類別</label><input class="form-input" type="text" id="mCat" placeholder="例：濾芯" list="mCatDL"><datalist id="mCatDL"></datalist></div>
      <div class="form-row"><label>週期（天）</label><input class="form-input" type="number" id="mCycle" placeholder="例：90" min="1"></div>
      <div class="form-row"><label>品牌／型號</label><input class="form-input" type="text" id="mBrand" placeholder="例：3M TR1"></div>
      <div class="form-row"><label>庫存數量</label><input class="form-input" type="text" id="mStock" placeholder="例：2顆"></div>
      <div class="form-row full"><label>上次日期</label><input class="form-input" type="date" id="mLastDate"></div>
      <div class="form-row full"><label>備註</label><input class="form-input" type="text" id="mNote" placeholder="注意事項…"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeMaintModal()">取消</button><button class="btn-save" id="maintSaveBtn" onclick="saveMaint()">儲存</button></div>
  </div>
</div>

<!-- DONE MODAL -->
<div class="overlay" id="doneOverlay" onclick="if(event.target===this)closeDoneModal()">
  <div class="modal sm-modal">
    <div class="modal-hdr"><div class="modal-title" id="doneTitle">記錄本次</div><button class="modal-close" onclick="closeDoneModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-row"><label>日期</label><input class="form-input" type="date" id="dDate"></div>
      <div class="form-row"><label>金額（元）</label><input class="form-input" type="number" id="dAmount" placeholder="0" min="0"></div>
      <div class="form-row full"><label>備註</label><input class="form-input" type="text" id="dNote" placeholder="更換細節…"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeDoneModal()">取消</button><button class="btn-save" onclick="saveDone()">記錄</button></div>
  </div>
</div>

<!-- HIST EDIT MODAL -->
<div class="overlay" id="histEditOverlay" onclick="if(event.target===this)closeHistEdit()">
  <div class="modal sm-modal">
    <div class="modal-hdr"><div class="modal-title">編輯紀錄</div><button class="modal-close" onclick="closeHistEdit()">✕</button></div>
    <div class="form-grid">
      <div class="form-row"><label>日期</label><input class="form-input" type="date" id="heDate"></div>
      <div class="form-row"><label>金額（元）</label><input class="form-input" type="number" id="heAmount" placeholder="0"></div>
      <div class="form-row full"><label>備註</label><input class="form-input" type="text" id="heNote"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeHistEdit()">取消</button><button class="btn-save" onclick="saveHistEdit()">儲存</button></div>
  </div>
</div>

<!-- REPAIR MODAL -->
<div class="overlay" id="repairOverlay" onclick="if(event.target===this)closeRepairModal()">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title" id="repairModalTitle">新增維修紀錄</div><button class="modal-close" onclick="closeRepairModal()">✕</button></div>
    <div class="photo-area"><input type="file" id="rPhotoInput" accept="image/*" onchange="handlePhoto(this,'rPhotoPreview','rPhotoHint','repair')"><div class="photo-hint" id="rPhotoHint"><div class="icon">📷</div><div>點擊上傳照片</div></div><img id="rPhotoPreview" style="display:none"></div>
    <div class="form-grid">
      <div class="form-row full"><label>維修項目 *</label><input class="form-input" type="text" id="rName" placeholder="例：冷氣、熱水器"></div>
      <div class="form-row full">
        <label>地點</label>
        <div class="toggle-group" id="rHouseGroup">
          <button type="button" class="tgl-btn active-blue" data-val="新家" onclick="toggleGroup('rHouseGroup',this)">🏠 新家</button>
          <button type="button" class="tgl-btn" data-val="舊家" onclick="toggleGroup('rHouseGroup',this)">🏡 舊家</button>
        </div>
      </div>
      <div class="form-row full">
        <label>保固</label>
        <div class="toggle-group" id="rWarrantyGroup">
          <button type="button" class="tgl-btn active-gray" data-val="無保固" onclick="toggleGroup('rWarrantyGroup',this);showWarrantyDate(false)">無保固</button>
          <button type="button" class="tgl-btn" data-val="有保固" onclick="toggleGroup('rWarrantyGroup',this);showWarrantyDate(true)">🛡️ 有保固</button>
        </div>
      </div>
      <div class="form-row full" id="warrantyDateRow" style="display:none"><label>保固到期日</label><input class="form-input" type="date" id="rWarrantyDate"></div>
      <div class="form-row"><label>類別</label><input class="form-input" type="text" id="rCat" placeholder="例：家電" list="rCatDL"><datalist id="rCatDL"></datalist></div>
      <div class="form-row"><label>維修日期</label><input class="form-input" type="date" id="rDate"></div>
      <div class="form-row full"><label>問題描述</label><input class="form-input" type="text" id="rProblem" placeholder="例：冷氣不冷、漏水"></div>
      <div class="form-row full"><label>處理方式</label><input class="form-input" type="text" id="rSolution" placeholder="例：更換壓縮機"></div>
      <div class="form-row"><label>廠商／師傅</label><input class="form-input" type="text" id="rVendor" placeholder="例：王師傅"></div>
      <div class="form-row"><label>聯絡電話</label><input class="form-input" type="tel" id="rPhone" placeholder="0912-345-678"></div>
      <div class="form-row"><label>金額（元）</label><input class="form-input" type="number" id="rAmount" placeholder="0" min="0"></div>
      <div class="form-row"><label>下次檢查日</label><input class="form-input" type="date" id="rNextCheck"></div>
      <div class="form-row full"><label>備註</label><input class="form-input" type="text" id="rNote" placeholder="其他注意事項…"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeRepairModal()">取消</button><button class="btn-save" id="repairSaveBtn" onclick="saveRepair()">儲存</button></div>
  </div>
</div>

<!-- REPAIR LOG MODAL -->
<div class="overlay" id="repairLogOverlay" onclick="if(event.target===this)closeRepairLogModal()">
  <div class="modal sm-modal">
    <div class="modal-hdr"><div class="modal-title">新增維修紀錄</div><button class="modal-close" onclick="closeRepairLogModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-row"><label>日期</label><input class="form-input" type="date" id="rlDate"></div>
      <div class="form-row"><label>金額（元）</label><input class="form-input" type="number" id="rlAmount" placeholder="0"></div>
      <div class="form-row full"><label>問題描述</label><input class="form-input" type="text" id="rlProblem" placeholder="這次的問題…"></div>
      <div class="form-row full"><label>處理方式</label><input class="form-input" type="text" id="rlSolution" placeholder="處理方式…"></div>
      <div class="form-row full"><label>備註</label><input class="form-input" type="text" id="rlNote"></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeRepairLogModal()">取消</button><button class="btn-save" onclick="saveRepairLog()">儲存</button></div>
  </div>
</div>

<!-- USER MODAL -->
<div class="overlay" id="userOverlay" onclick="if(event.target===this&&currentUser)this.classList.remove('open')">

<script>
const DB = "https://family-8a3a6-default-rtdb.firebaseio.com";
const AUTH = ""; // open rules, no auth needed

// REST API helpers
async function dbGet(path) {
  const r = await fetch(`${DB}/${path}.json`);
  return r.json();
}
async function dbSet(path, data) {
  await fetch(`${DB}/${path}.json`, {method:'PUT', body: JSON.stringify(data)});
}
async function dbPush(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {method:'POST', body: JSON.stringify(data)});
  return r.json(); // returns {name: key}
}
async function dbUpdate(path, data) {
  await fetch(`${DB}/${path}.json`, {method:'PATCH', body: JSON.stringify(data)});
}
async function dbDelete(path) {
  await fetch(`${DB}/${path}.json`, {method:'DELETE'});
}
function objToArr(obj) {
  if(!obj) return [];
  return Object.entries(obj).map(([k,v])=>({...v,_key:k}));
}

let foods=[], maints=[], repairs=[], knownUsers=[];
let currentTab='food';
let activeZone='', activeHouse='', activeMHouse='', filterMode='';
let photoBuffers={food:null,maint:null,repair:null};
let editFoodKey=null, editMaintKey=null, editRepairKey=null;
let foodDetailKey=null, maintDetailKey=null, repairDetailKey=null;
let doneTargetKey=null, batchTargetKey=null, repairLogKey=null;
let histEditType=null, histEditKey=null, histEditRecKey=null;
let currentUser=localStorage.getItem('food_username')||'';
let pollInterval=null;

const ZONES=['冷凍','冷藏','常溫'];
const ZONE_ICONS={'冷凍':'❄️','冷藏':'🌡️','常溫':'🏠'};
const CAT_EMOJI={'肉類':'🥩','魚類':'🐟','海鮮':'🦐','蔬菜':'🥦','水果':'🍎','乳製品':'🥛','蛋類':'🥚','主食':'🍚','調味料':'🧂','飲料':'🧃','零食':'🍪','麵包':'🍞'};
const MAINT_EMOJI={'濾芯':'💧','濾網':'🌀','電池':'🔋','燈泡':'💡','清潔':'🧹','冷氣':'❄️','熱水器':'🚿'};
const REPAIR_EMOJI={'家電':'🔌','水電':'🔧','木工':'🪚','冷氣':'❄️','熱水器':'🚿','網路':'📡','油漆':'🎨','地板':'🏠'};

if(!currentUser) setTimeout(()=>openUserModal(),600);
else document.getElementById('userNameDisplay').textContent=currentUser;

// Initial load
async function loadAll() {
  try {
    const [f,m,r,u] = await Promise.all([
      dbGet('foods_v2'), dbGet('maints_v2'), dbGet('repairs'), dbGet('users')
    ]);
    foods = objToArr(f);
    maints = objToArr(m);
    repairs = objToArr(r);
    knownUsers = u ? Object.values(u) : [];
    if(foods.length===0) await seedFoods();
    document.getElementById('loadingScreen').style.display='none';
    showTab(currentTab);
    setSyncBadge(true);
    renderFood(); renderMaint(); renderRepair(); refreshUserPresets();
    // Poll every 30s for sync
    pollInterval = setInterval(pollData, 30000);
  } catch(e) {
    document.getElementById('loadingScreen').style.display='none';
    showTab(currentTab);
    setSyncBadge(false);
    toast('載入失敗，請重新整理','err');
  }
}

async function pollData() {
  try {
    const [f,m,r,u] = await Promise.all([
      dbGet('foods_v2'), dbGet('maints_v2'), dbGet('repairs'), dbGet('users')
    ]);
    foods = objToArr(f); maints = objToArr(m); repairs = objToArr(r);
    knownUsers = u ? Object.values(u) : [];
    renderFood(); renderMaint(); renderRepair(); refreshUserPresets();
    setSyncBadge(true);
  } catch(e) { setSyncBadge(false); }
}

loadAll();

function setSyncBadge(ok){const b=document.getElementById('syncBadge');b.className='sync-badge '+(ok?'online':'offline');document.getElementById('syncText').textContent=ok?'已同步':'連線失敗';}

async function seedFoods(){
  const d=n=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);};
  const seeds=[
    {name:'雞胸肉',zone:'冷凍',house:'新家',category:'肉類',location:'下層',opened:'未開封',note:'',photo:null,batches:{b1:{qty:'2包',expiry:d(5),note:''},b2:{qty:'1包',expiry:d(45),note:''}}},
    {name:'牛奶',zone:'冷藏',house:'新家',category:'乳製品',location:'門架',opened:'已開封',note:'',photo:null,batches:{b1:{qty:'1瓶',expiry:d(6),note:''}}},
    {name:'白米',zone:'常溫',house:'舊家',category:'主食',location:'米桶',opened:'未開封',note:'',photo:null,batches:{b1:{qty:'5kg',expiry:d(180),note:''}}}
  ];
  for(const s of seeds){ await dbPush('foods_v2',{...s,addedAt:Date.now(),updatedAt:Date.now(),updatedBy:'系統'}); }
  const f=await dbGet('foods_v2'); foods=objToArr(f);
}
// UTILS
function daysLeft(exp){if(!exp)return null;return Math.floor((new Date(exp)-new Date())/86400000);}
function expClass(d){if(d===null)return'ok';if(d<0)return'expired';if(d<=7)return'warn7';if(d<=30)return'warn30';return'ok';}
function expText(d){if(d===null)return'未設定';if(d<0)return`過期${Math.abs(d)}天`;if(d===0)return'今天到期';if(d===1)return'明天';return`剩${d}天`;}
function fmtDate(s){if(!s)return'';const p=s.split('-');return`${parseInt(p[1])}/${parseInt(p[2])}`;}
function fmtFull(s){if(!s)return'';const p=s.split('-');return`${p[0]}/${parseInt(p[1])}/${parseInt(p[2])}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(ts){if(!ts)return'';const d=Math.floor((Date.now()-ts)/1000);if(d<60)return'剛剛';if(d<3600)return`${Math.floor(d/60)}分鐘前`;if(d<86400)return`${Math.floor(d/3600)}小時前`;return`${Math.floor(d/86400)}天前`;}
function today(){return new Date().toISOString().slice(0,10);}
function getBatches(food){return food.batches?Object.entries(food.batches).map(([k,v])=>({...v,_bkey:k})):[];}
function getEarliestBatch(food){const bs=getBatches(food).filter(b=>b.expiry);if(!bs.length)return getBatches(food)[0]||null;return bs.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry))[0];}
function getTotalQty(food){
  const bs=getBatches(food);if(!bs.length)return'—';
  const parts=bs.map(b=>b.qty||'').filter(Boolean);
  if(parts.length===1)return parts[0];
  const matches=parts.map(p=>p.match(/^([\d.]+)\s*(.*)$/));
  if(matches.every(m=>m&&m[2]===matches[0][2])){const sum=matches.reduce((s,m)=>s+parseFloat(m[1]),0);return(Number.isInteger(sum)?sum:sum.toFixed(1))+matches[0][2];}
  return parts.join('+');
}
function getHistory(item,path){return item[path]?Object.entries(item[path]).map(([k,v])=>({...v,_hkey:k})):[];}
function maintNextDate(item){if(!item.lastDate||!item.cycle)return null;const d=new Date(item.lastDate);d.setDate(d.getDate()+parseInt(item.cycle));return d.toISOString().slice(0,10);}
function maintDaysLeft(item){const nd=maintNextDate(item);return nd?daysLeft(nd):null;}

// TOGGLE GROUP - 核心修正，用純 button 確保可點擊
window.toggleGroup=function(groupId, clickedBtn){
  const group=document.getElementById(groupId);
  if(!group)return;
  const btns=group.querySelectorAll('.tgl-btn');
  // 找出 active class
  let activeClass='active-blue';
  for(const cls of clickedBtn.classList){if(cls.startsWith('active-')){activeClass=cls;break;}}
  // 從所有按鈕移除所有 active class
  btns.forEach(b=>{
    b.classList.remove('active-blue','active-gray','active-teal','active-green','active-orange','active-purple');
  });
  // 給點擊的加上 active class（根據 groupId 決定顏色）
  const colorMap={
    fHouseGroup:'active-blue', mHouseGroup:'active-blue', rHouseGroup:'active-blue',
    fOpenGroup_未開封:'active-green', fOpenGroup_已開封:'active-teal',
    mTypeGroup_更換:'active-orange', mTypeGroup_保養:'active-purple',
    rWarrantyGroup_無保固:'active-gray', rWarrantyGroup_有保固:'active-green',
  };
  const val=clickedBtn.dataset.val||'';
  const key=`${groupId}_${val}`;
  const color=colorMap[key]||colorMap[groupId]||'active-blue';
  clickedBtn.classList.add(color);
}

function getGroupVal(groupId){
  const group=document.getElementById(groupId);
  if(!group)return null;
  for(const b of group.querySelectorAll('.tgl-btn')){
    for(const cls of b.classList){if(cls.startsWith('active-'))return b.dataset.val;}
  }
  return null;
}

function setGroupVal(groupId, val, colorMap){
  const group=document.getElementById(groupId);
  if(!group)return;
  group.querySelectorAll('.tgl-btn').forEach(b=>{
    b.classList.remove('active-blue','active-gray','active-teal','active-green','active-orange','active-purple');
    if(b.dataset.val===val){
      const key=`${groupId}_${val}`;
      const color=colorMap[key]||colorMap[groupId]||'active-blue';
      b.classList.add(color);
    }
  });
}

const GROUP_COLORS={
  fHouseGroup:'active-blue', mHouseGroup:'active-blue', rHouseGroup:'active-blue',
  'fHouseGroup_新家':'active-blue','fHouseGroup_舊家':'active-gray',
  'mHouseGroup_新家':'active-blue','mHouseGroup_舊家':'active-gray',
  'rHouseGroup_新家':'active-blue','rHouseGroup_舊家':'active-gray',
  'fOpenGroup_未開封':'active-green','fOpenGroup_已開封':'active-teal',
  'mTypeGroup_更換':'active-orange','mTypeGroup_保養':'active-purple',
  'rWarrantyGroup_無保固':'active-gray','rWarrantyGroup_有保固':'active-green',
};

// TAB
window.switchTab=function(tab){currentTab=tab;['food','maint','repair'].forEach(t=>{document.getElementById('tab-'+t).className='main-tab'+(t===tab?' active':'');});showTab(tab);}
function showTab(tab){['food','maint','repair'].forEach(t=>{document.getElementById(t+'Tab').style.display=t===tab?'block':'none';});}

// FOOD RENDER
window.renderFood=function(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const sort=document.getElementById('sortSel').value;
  let list=foods.filter(i=>{
    const mQ=!q||(i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q);
    const mC=!cat||i.category===cat;
    const mZ=!activeZone||i.zone===activeZone;
    const mH=!activeHouse||i.house===activeHouse;
    const eb=getEarliestBatch(i);const d=eb?daysLeft(eb.expiry):null;
    const mF=!filterMode||(filterMode==='warn'&&d!==null&&d>=0&&d<=30)||(filterMode==='expired'&&d!==null&&d<0);
    return mQ&&mC&&mZ&&mH&&mF;
  });
  list.sort((a,b)=>{
    if(sort==='expiry'){const ea=getEarliestBatch(a),eb2=getEarliestBatch(b);return (ea?daysLeft(ea.expiry)??9999:9999)-(eb2?daysLeft(eb2.expiry)??9999:9999);}
    if(sort==='name')return(a.name||'').localeCompare(b.name||'','zh-TW');
    if(sort==='zone')return ZONES.indexOf(a.zone)-ZONES.indexOf(b.zone);
    return(b.updatedAt||0)-(a.updatedAt||0);
  });
  document.getElementById('sTotal').textContent=foods.length;
  document.getElementById('sOpened').textContent=foods.filter(i=>i.opened==='已開封').length;
  document.getElementById('sWarn').textContent=foods.filter(i=>{const eb=getEarliestBatch(i);const d=eb?daysLeft(eb.expiry):null;return d!==null&&d>=0&&d<=30;}).length;
  document.getElementById('sExpired').textContent=foods.filter(i=>{const eb=getEarliestBatch(i);const d=eb?daysLeft(eb.expiry):null;return d!==null&&d<0;}).length;
  document.getElementById('cnt-all').textContent=foods.length;
  ZONES.forEach(z=>{const el=document.getElementById('cnt-'+z);if(el)el.textContent=foods.filter(i=>i.zone===z).length;});
  document.getElementById('hcnt-all').textContent=foods.length;
  ['新家','舊家'].forEach(h=>{const el=document.getElementById('hcnt-'+h);if(el)el.textContent=foods.filter(i=>i.house===h).length;});
  const cats=[...new Set(foods.map(i=>i.category).filter(Boolean))].sort();
  const cf=document.getElementById('catFilter');const prev=cf.value;
  cf.innerHTML='<option value="">全部類別</option>'+cats.map(c=>`<option value="${esc(c)}"${c===prev?' selected':''}>${esc(c)}</option>`).join('');
  document.getElementById('catDL').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');
  const el=document.getElementById('foodList');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-emoji">🥡</div><p>沒有符合的食材</p></div>`;return;}
  el.innerHTML=list.map(item=>{
    const eb=getEarliestBatch(item);
    const d=eb?daysLeft(eb.expiry):null;
    const cls=expClass(d);
    const batchCount=getBatches(item).length;
    const totalQty=getTotalQty(item);
    const photo=item.photo?`<img src="${item.photo}" alt="">`:(CAT_EMOJI[item.category]||'🥡');
    const circleClass=d===null?'none':cls;
    const daysNum=d===null?'—':(d<0?Math.abs(d):d);
    const daysUnit=d===null?'':(d<0?'天前':'天');
    const expiryLabel=batchCount>1?'最早到期':'保存期限';
    const isNew=item.house==='新家';
    return`<div class="food-row" onclick="openFoodDetail('${item._key}')">
      <div class="food-row-photo">${photo}</div>
      <div class="food-row-main">
        <div class="food-row-name-row">
          <div class="food-row-name">${esc(item.name)}${batchCount>1?`<span class="batch-cnt-badge"> (${batchCount}批)</span>`:''}</div>
          <span class="house-tag ${isNew?'house-tag-new':'house-tag-old'}">${isNew?'🏠 新家':'🏡 舊家'}</span>
        </div>
        <div class="quick-row" onclick="event.stopPropagation()">
          <button class="qty-btn minus" onclick="quickMinus('${item._key}')">−</button>
          <span class="qty-total">${esc(totalQty)}</span>
          <button class="qty-btn" onclick="openBatchDirect('${item._key}',event)">＋</button>
          <button class="btn-used-up" onclick="markUsed('${item._key}','${esc(item.name)}',event)">用完</button>
        </div>
        <div class="food-row-chips">
          <span class="chip chip-zone">${ZONE_ICONS[item.zone]||''} ${esc(item.zone)}</span>
          <span class="chip ${item.opened==='已開封'?'chip-open':'chip-sealed'}">${item.opened==='已開封'?'📦 已開封':'🔒 未開封'}</span>
          ${item.location?`<span class="chip chip-loc">📍${esc(item.location)}</span>`:''}
        </div>
      </div>
      <div class="days-circle-wrap">
        <div class="days-circle ${circleClass}">
          <span class="days-num">${daysNum}</span>
          <span class="days-unit">${daysUnit}</span>
        </div>
        <div class="days-date">${eb&&eb.expiry?fmtDate(eb.expiry):''}</div>
      </div>
    </div>`;
  }).join('');
}

// MAINT RENDER
window.renderMaint=function(){
  const q=document.getElementById('mSearchInput').value.toLowerCase();
  const cat=document.getElementById('mCatFilter').value;
  let list=maints.filter(i=>{
    const mQ=!q||(i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)||(i.brand||'').toLowerCase().includes(q);
    return mQ&&(!cat||i.category===cat)&&(!activeMHouse||i.house===activeMHouse);
  });
  list.sort((a,b)=>(maintDaysLeft(a)??9999)-(maintDaysLeft(b)??9999));
  document.getElementById('msTotal').textContent=maints.length;
  document.getElementById('msWarn').textContent=maints.filter(i=>{const d=maintDaysLeft(i);return d!==null&&d>=0&&d<=7;}).length;
  document.getElementById('msExpired').textContent=maints.filter(i=>{const d=maintDaysLeft(i);return d!==null&&d<0;}).length;
  document.getElementById('mhcnt-all').textContent=maints.length;
  ['新家','舊家'].forEach(h=>{const el=document.getElementById('mhcnt-'+h);if(el)el.textContent=maints.filter(i=>i.house===h).length;});
  const cats=[...new Set(maints.map(i=>i.category).filter(Boolean))].sort();
  const cf=document.getElementById('mCatFilter');const prev=cf.value;
  cf.innerHTML='<option value="">全部類別</option>'+cats.map(c=>`<option value="${esc(c)}"${c===prev?' selected':''}>${esc(c)}</option>`).join('');
  document.getElementById('mCatDL').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');
  const grid=document.getElementById('maintGrid');
  if(!list.length){grid.innerHTML=`<div class="empty"><div class="empty-emoji">🔧</div><p>還沒有耗材紀錄</p></div>`;return;}
  grid.innerHTML=list.map(item=>{
    const d=maintDaysLeft(item);const cls=expClass(d);
    const fill=d===null?100:Math.max(3,Math.min(100,((item.cycle||90)+d)/(item.cycle||90)*100));
    const nextDate=maintNextDate(item);
    const icon=MAINT_EMOJI[item.category]||'🔧';
    const isReplace=item.mtype!=='保養';
    const photo=item.photo?`<img src="${item.photo}" alt="">`:null;
    return`<div class="maint-card" onclick="openMaintDetail('${item._key}')">
      ${photo?`<div class="maint-photo">${photo}</div>`:''}
      <div class="maint-top">
        <div class="maint-icon-row">
          <div class="maint-icon">${icon}</div>
          <div>
            <div class="maint-name">${esc(item.name)}</div>
            <div style="display:flex;gap:3px;margin-top:3px;flex-wrap:wrap">
              <span class="chip ${isReplace?'chip-type-replace':'chip-type-maint'}">${isReplace?'🔄 更換':'🛠️ 保養'}</span>
              <span class="chip ${item.house==='新家'?'chip-loc':'chip-maint'}">${item.house==='新家'?'🏠 新家':'🏡 舊家'}</span>
              ${item.stock?`<span class="chip chip-loc">庫存:${esc(item.stock)}</span>`:''}
            </div>
          </div>
        </div>
      </div>
      <div class="maint-body">
        <div class="expiry-bar-wrap">
          <div class="expiry-row"><span>${isReplace?'下次更換':'下次保養'}</span><div class="expiry-right"><span class="expiry-days ${cls}">${expText(d)}</span>${nextDate?`<span class="expiry-date-small">· ${fmtDate(nextDate)}</span>`:''}</div></div>
          <div class="ebar"><div class="efill ${cls}" style="width:${fill}%"></div></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px">
          ${item.category?`<span class="chip chip-maint">${esc(item.category)}</span>`:''}
          ${item.cycle?`<span class="chip chip-loc">每${item.cycle}天</span>`:''}
          ${item.brand?`<span class="chip chip-loc">${esc(item.brand)}</span>`:''}
        </div>
        ${item.updatedBy?`<div class="card-updated">✏️ ${esc(item.updatedBy)} · ${timeAgo(item.updatedAt)}</div>`:''}
        <div class="maint-actions" onclick="event.stopPropagation()">
          <button class="card-btn card-btn-done" onclick="openDoneModalFor('${item._key}')">已${isReplace?'換':'保養'}✓</button>
          <button class="card-btn card-btn-edit" onclick="openMaintModal('${item._key}')">編輯</button>
          <button class="card-btn card-btn-del" onclick="deleteMaint('${item._key}','${esc(item.name)}')">刪除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// REPAIR RENDER
window.renderRepair=function(){
  const q=document.getElementById('rSearchInput').value.toLowerCase();
  const cat=document.getElementById('rCatFilter').value;
  const loc=document.getElementById('rLocFilter').value;
  let list=repairs.filter(i=>{
    const mQ=!q||(i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)||(i.problem||'').toLowerCase().includes(q)||(i.vendor||'').toLowerCase().includes(q);
    return mQ&&(!cat||i.category===cat)&&(!loc||i.house===loc);
  });
  list.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  const now=new Date();
  document.getElementById('rsTotal').textContent=repairs.length;
  document.getElementById('rsWarranty').textContent=repairs.filter(i=>i.warranty==='有保固'&&i.warrantyDate&&new Date(i.warrantyDate)>=now).length;
  document.getElementById('rsWarrantyExp').textContent=repairs.filter(i=>{const d=i.warrantyDate?daysLeft(i.warrantyDate):null;return d!==null&&d>=0&&d<=30;}).length;
  const cats=[...new Set(repairs.map(i=>i.category).filter(Boolean))].sort();
  const cf=document.getElementById('rCatFilter');const prev=cf.value;
  cf.innerHTML='<option value="">全部類別</option>'+cats.map(c=>`<option value="${esc(c)}"${c===prev?' selected':''}>${esc(c)}</option>`).join('');
  document.getElementById('rCatDL').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');
  const el=document.getElementById('repairList');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-emoji">🛠️</div><p>還沒有維修紀錄</p></div>`;return;}
  el.innerHTML=list.map(item=>{
    const icon=REPAIR_EMOJI[item.category]||'🔧';
    const photo=item.photo?`<img src="${item.photo}" alt="">`:icon;
    const wDays=item.warrantyDate?daysLeft(item.warrantyDate):null;
    const logs=getHistory(item,'logs');
    const totalSpent=logs.reduce((s,l)=>s+(parseFloat(l.amount)||0),0)+(parseFloat(item.amount)||0);
    const isNew=item.house==='新家';
    return`<div class="repair-row" onclick="openRepairDetail('${item._key}')">
      <div class="repair-photo">${photo}</div>
      <div class="repair-main">

// QUICK USE
window.quickMinus=function(key){
  if(!currentUser){openUserModal();return;}
  const item=foods.find(i=>i._key===key);if(!item)return;
  const bs=getBatches(item).sort((a,b)=>(a.expiry?daysLeft(a.expiry):9999)-(b.expiry?daysLeft(b.expiry):9999));
  if(!bs.length)return;
  const eb=bs[0];const match=(eb.qty||'').match(/^([\d.]+)(.*)/);
  if(match){
    const num=parseFloat(match[1])-1;if(num<0)return;
    const newQty=(Number.isInteger(num)?num:num.toFixed(1))+match[2];
    dbUpdate(`foods_v2/${key}/batches/${eb._bkey}`,{qty:newQty});
    dbUpdate(`foods_v2/${key}`,{updatedAt:Date.now(),updatedBy:currentUser});
    toast(`${item.name} → ${newQty}`,'warn');
  }else{openFoodDetail(key);}
}

  const data={name,mtype,house,category:document.getElementById('mCat').value.trim(),cycle:parseInt(document.getElementById('mCycle').value)||90,brand:document.getElementById('mBrand').value.trim(),stock:document.getElementById('mStock').value.trim(),lastDate:document.getElementById('mLastDate').value,note:document.getElementById('mNote').value.trim(),photo:photoBuffers.maint,updatedAt:Date.now(),updatedBy:currentUser};
  const btn=document.getElementById('maintSaveBtn');btn.disabled=true;btn.textContent='儲存中…';
  try{
    if(editMaintKey){await dbUpdate(`maints_v2/${editMaintKey}`,data);toast(`「${name}」已更新`,'ok');}
    else{await dbPush('maints_v2',{...data,addedAt:Date.now()});toast(`「${name}」已新增`,'ok');}
    closeMaintModal();
  }catch(e){toast('儲存失敗','err');}
  btn.disabled=false;btn.textContent='儲存';
}
window.deleteMaint=async function(key,name){if(!confirm(`確定刪除「${name}」？`))return;await dbDelete(`maints_v2/${key}`);toast(`已刪除「${name}」`,'warn');}

// REPAIR MODAL
window.openRepairModal=function(key=null){
  editRepairKey=key;
  const item=key?repairs.find(i=>i._key===key):null;
  document.getElementById('repairModalTitle').textContent=key?'編輯維修紀錄':'新增維修紀錄';
  document.getElementById('rName').value=item?.name||'';
  document.getElementById('rCat').value=item?.category||'';
  document.getElementById('rDate').value=item?.date||today();
  document.getElementById('rProblem').value=item?.problem||'';
  document.getElementById('rSolution').value=item?.solution||'';
  document.getElementById('rVendor').value=item?.vendor||'';
  document.getElementById('rPhone').value=item?.phone||'';
  document.getElementById('rAmount').value=item?.amount||'';
  document.getElementById('rNextCheck').value=item?.nextCheck||'';
  document.getElementById('rNote').value=item?.note||'';
  document.getElementById('rWarrantyDate').value=item?.warrantyDate||'';
  const hasW=item?.warranty==='有保固';
  document.getElementById('warrantyDateRow').style.display=hasW?'block':'none';
  photoBuffers.repair=item?.photo||null;
  setPhotoPreview('rPhotoPreview','rPhotoHint',photoBuffers.repair);
  setGroupVal('rHouseGroup',item?.house||'新家',GROUP_COLORS);
  setGroupVal('rWarrantyGroup',item?.warranty||'無保固',GROUP_COLORS);
  document.getElementById('repairOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('rName').focus(),100);
}
window.closeRepairModal=function(){document.getElementById('repairOverlay').classList.remove('open');editRepairKey=null;photoBuffers.repair=null;document.getElementById('rPhotoInput').value='';}
window.showWarrantyDate=function(show){document.getElementById('warrantyDateRow').style.display=show?'block':'none';}
window.saveRepair=async function(){
  if(!currentUser){openUserModal();return;}
  const name=document.getElementById('rName').value.trim();
  if(!name){toast('請填寫維修項目','err');return;}
  const house=getGroupVal('rHouseGroup')||'新家';
  const warranty=getGroupVal('rWarrantyGroup')||'無保固';
  const data={name,house,warranty,category:document.getElementById('rCat').value.trim(),date:document.getElementById('rDate').value,problem:document.getElementById('rProblem').value.trim(),solution:document.getElementById('rSolution').value.trim(),vendor:document.getElementById('rVendor').value.trim(),phone:document.getElementById('rPhone').value.trim(),amount:parseFloat(document.getElementById('rAmount').value)||0,warrantyDate:warranty==='有保固'?document.getElementById('rWarrantyDate').value:'',nextCheck:document.getElementById('rNextCheck').value,note:document.getElementById('rNote').value.trim(),photo:photoBuffers.repair,updatedAt:Date.now(),updatedBy:currentUser};
  const btn=document.getElementById('repairSaveBtn');btn.disabled=true;btn.textContent='儲存中…';
  try{
    if(editRepairKey){await dbUpdate(`repairs/${editRepairKey}`,data);toast(`「${name}」已更新`,'ok');}
    else{await dbPush('repairs',{...data,addedAt:Date.now()});toast(`「${name}」已新增`,'ok');}
    closeRepairModal();
  }catch(e){toast('儲存失敗','err');}
  btn.disabled=false;btn.textContent='儲存';
}

// PHOTO
window.handlePhoto=function(input,previewId,hintId,type){
  const file=input.files[0];if(!file)return;
  const canvas=document.createElement('canvas'),img=new Image(),url=URL.createObjectURL(file);
  img.onload=()=>{const MAX=600;let w=img.width,h=img.height;if(w>h&&w>MAX){h=h*MAX/w;w=MAX;}else if(h>MAX){w=w*MAX/h;h=MAX;}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);const buf=canvas.toDataURL('image/jpeg',.75);photoBuffers[type]=buf;setPhotoPreview(previewId,hintId,buf);URL.revokeObjectURL(url);};img.src=url;
}
function setPhotoPreview(previewId,hintId,buf){
  const prev=document.getElementById(previewId),hint=document.getElementById(hintId);
  if(buf){prev.src=buf;prev.style.display='block';hint.style.display='none';}
  else{prev.style.display='none';hint.style.display='flex';}
}

// ZONE
window.selZone=function(el){document.querySelectorAll('.zone-opt').forEach(o=>o.classList.remove('active'));el.classList.add('active');}

// FILTERS
window.setZone=function(el){filterMode='';activeZone=el.dataset.zone;document.querySelectorAll('[data-zone]').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderFood();}
window.setHouse=function(el){filterMode='';activeHouse=el.dataset.house;document.querySelectorAll('[data-house]').forEach(t=>t.classList.remove('active','hactive'));el.classList.add('hactive');renderFood();}
window.setMHouse=function(el){activeMHouse=el.dataset.mhouse;document.querySelectorAll('[data-mhouse]').forEach(t=>t.classList.remove('active','hactive'));el.classList.add('hactive');renderMaint();}
window.filterWarn=function(){filterMode='warn';renderFood();}
window.filterExpired=function(){filterMode='expired';renderFood();}

// USER
window.openUserModal=function(){document.getElementById('userOverlay').classList.add('open');document.getElementById('userNameInput').value=currentUser;refreshUserPresets();}
window.confirmUser=function(){
  const name=document.getElementById('userNameInput').value.trim();
  if(!name){toast('請輸入名字','err');return;}
  currentUser=name;localStorage.setItem('food_username',name);
  document.getElementById('userNameDisplay').textContent=name;
  document.getElementById('userOverlay').classList.remove('open');
  dbPush('users',name);toast(`歡迎，${name}！`,'ok');
}
function refreshUserPresets(){
  const unique=[...new Set(knownUsers)].filter(Boolean).slice(0,8);
  const saved=localStorage.getItem('food_username');
  document.getElementById('userPresets').innerHTML=unique.map(u=>`<div class="user-preset${u===saved?' selected':''}" onclick="pickUser('${esc(u)}')">${esc(u)}</div>`).join('');
}
window.pickUser=function(name){document.getElementById('userNameInput').value=name;document.querySelectorAll('.user-preset').forEach(p=>p.classList.toggle('selected',p.textContent===name));}

// TOAST
window.toast=function(msg,type='ok'){
  const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),350);},2800);
}

function setGroupVal(groupId,val,colorMap){
  const group=document.getElementById(groupId);if(!group)return;
  group.querySelectorAll('.tgl-btn').forEach(b=>{
    b.classList.remove('active-blue','active-gray','active-teal','active-green','active-orange','active-purple');
    if(b.dataset.val===val){const key=`${groupId}_${val}`;b.classList.add(colorMap[key]||colorMap[groupId]||'active-blue');}
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    ['foodOverlay','maintOverlay','repairOverlay','batchOverlay','doneOverlay','histEditOverlay','repairLogOverlay','userOverlay'].forEach(id=>document.getElementById(id).classList.remove('open'));
    ['foodSheet','maintSheet','repairSheet'].forEach(id=>document.getElementById(id).classList.remove('open'));
  }
});

</script>
